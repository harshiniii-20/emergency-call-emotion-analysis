kind = "web"
previewPath = "/"
title = "Emergency Call Emotion Analysis"
version = "1.0.0"
id = "artifacts/emergency-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19082
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/emergency-dashboard run dev"

[services.env]
PORT = "19082"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/emergency-dashboard", "run", "build"]
publicDir = "artifacts/emergency-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
